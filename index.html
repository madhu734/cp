    // --- Title Case Function ---
    function toTitleCase(str) {
      if (!str) return "";
      const minorWords = new Set(["a", "an", "the", "and", "but", "or", "for", "nor", "on", "in", "at", "to", "by", "with", "of", "from", "into", "over", "under", "about", "through", "as"]);
      return str.split('\n').map(line => {
        const words = line.split(/(\s+)/);
        return words.map((word, index) => {
          if (/^\s+$/.test(word) || word === "") return word;
          const cleanWord = word.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"").toLowerCase();
          const isFirst = index === 0;
          const isLast = index === words.length - 1;
          if (isFirst || isLast || !minorWords.has(cleanWord)) {
            return word.charAt(0).toUpperCase() + word.slice(1).toLowerCase();
          }
          return word.toLowerCase();
        }).join("");
      }).join('\n');
    }

              <div class="grid grid-cols-2 gap-3">
                <div class="flex flex-col gap-1">
                  <label class="text-xs font-bold text-slate-600 uppercase tracking-wide">Course <span class="text-red-500">*</span></label>
                  <select
                    value={selectedCourseCode}
                    onChange={(e) => setSelectedCourseCode(e.target.value)}
                    class="w-full p-2 text-xs rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white font-semibold text-slate-700"
                  >
                    <option value="">Code</option>
                    {coursesData.map(c => <option key={c.code} value={c.code}>{c.code}</option>)}
                  </select>
                </div>

                <div class="flex flex-col gap-1">
                  <label class="text-xs font-bold text-slate-600 uppercase tracking-wide">Roll <span class="text-red-500">*</span></label>
                  <select
                    value={selectedRoll}
                    onChange={(e) => setSelectedRoll(e.target.value)}
                    class="w-full p-2 text-xs rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white font-semibold text-slate-700"
                  >
                    <option value="">Roll</option>
                    {studentsData.map(s => <option key={s.roll} value={s.roll}>{s.roll}</option>)}
                  </select>
                </div>
              </div>

              <div class="flex flex-col gap-1">
                <label class="text-xs font-bold text-slate-600 uppercase tracking-wide">Teacher <span class="text-red-500">*</span></label>
                <select
                  value={selectedTeacherIndex}
                  onChange={(e) => setSelectedTeacherIndex(e.target.value === "" ? "" : parseInt(e.target.value))}
                  class="w-full p-2 text-xs rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white text-slate-700"
                >
                  <option value="">Select Teacher</option>
                  {teachersData.map((t, idx) => <option key={idx} value={idx}>{t.name}</option>)}
                </select>
              </div>

              <div class="flex flex-col gap-1">
                <label class="text-xs font-bold text-slate-600 uppercase tracking-wide">Submit Date <span class="text-red-500">*</span></label>
                <input
                  type="date"
                  value={submissionDate}
                  onKeyDown={(e) => e.preventDefault()}
                  onClick={(e) => e.target.showPicker && e.target.showPicker()}
                  onChange={(e) => setSubmissionDate(e.target.value)}
                  class="w-full p-2 text-xs rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 text-slate-600 font-semibold cursor-pointer smart-date-input"
                />
              </div>

              {/* Layout Option replacing Border Option */}
              <div class="h-px bg-slate-100 my-1"></div>
              <div class="flex items-center justify-between gap-2">
                <span class="text-[11px] font-bold text-slate-500 uppercase tracking-wider">Layout Style</span>
                <div class="flex bg-slate-100 rounded-lg p-0.5 border border-slate-200/60">
                  <button onClick={() => setLayoutStyle("centered")} class={`px-2 py-1 text-[10px] rounded-md font-bold transition-all ${layoutStyle === "centered" ? "bg-white shadow-sm text-blue-700" : "text-slate-500"}`}>Centered</button>
                  <button onClick={() => setLayoutStyle("side-by-side")} class={`px-2 py-1 text-[10px] rounded-md font-bold transition-all ${layoutStyle === "side-by-side" ? "bg-white shadow-sm text-blue-700" : "text-slate-500"}`}>Side-by-Side</button>
                </div>
              </div>
            </div>

            {/* Action Buttons */}
            <div class="mt-auto pt-4 flex flex-col gap-2">
              <button onClick={handlePdfDownload} class="w-full py-2.5 bg-slate-900 hover:bg-slate-800 text-white font-bold text-xs rounded-xl shadow-md flex items-center justify-center gap-2 transition-all active:scale-95">
                <i data-lucide="download" class="w-4 h-4"></i> Download PDF
              </button>
              <button onClick={handleWordDownload} class="w-full py-2 bg-blue-50 hover:bg-blue-100 text-blue-700 font-bold text-xs rounded-xl flex items-center justify-center gap-2 border border-blue-200 transition-all active:scale-95">
                <i data-lucide="file-text" class="w-4 h-4"></i> Download Word (.doc)
              </button>
            </div>
          </div>

          {/* Document Preview (Right) - FIXED STRICT A4 STRUCTURE */}
          <div class="flex-1 flex justify-center w-full overflow-auto py-2">
            
            <div 
              id="cover-page-document"
              class="bg-white a4-preview relative"
              style={{
                padding: '50px 60px', /* Standard Margins */
                margin: '0 auto',
                boxSizing: 'border-box',
                display: 'flex',
                flexDirection: 'column'
              }}
            >
              
              {/* Header: Logo and Topic */}
              <div style={{ textAlign: 'center', marginBottom: '25px', marginTop: '15px' }}>
                <img 
                  src={base64Logo || "https://i.postimg.cc/3xrkfThk/ju-logo.png"} 
                  alt="JU Logo" 
                  style={{ width: '135px', height: '135px', objectFit: 'contain', margin: '0 auto 20px auto' }}
                  crossOrigin="anonymous"
                />

                <div class="academic-font">
                  <p style={{ fontSize: '12pt', marginBottom: '8px' }}>Assignment on</p>
                  <h2 style={{ fontSize: '14pt', fontWeight: 'bold', whiteSpace: 'pre-wrap', lineHeight: '1.4', margin: '0 auto' }}>
                    {titleCasedTopic}
                  </h2>
                </div>
              </div>

              {/* Middle: Course Info */}
              <div class="academic-font" style={{ textAlign: 'center', fontSize: '12pt', lineHeight: '1.5', marginTop: '15px' }}>
                <p>Course Code: <span style={{ fontWeight: 'bold' }}>{selectedCourseCode || "_____"}</span></p>
                <p>Course Title: <span style={{ fontWeight: 'bold' }}>{currentCourseTitle}</span></p>
              </div>

              {/* Lower Middle: Submitted To & By */}
              <div style={{ width: '100%', marginTop: '40px' }}>
                {layoutStyle === 'centered' ? (
                  <div class="academic-font" style={{ textAlign: 'center', fontSize: '12pt', lineHeight: '1.5' }}>
                    <div style={{ marginBottom: '35px' }}>
                      <p>Submitted to</p>
                      <p style={{ fontWeight: 'bold' }}>{currentTeacher.name}</p>
                      <p>{currentTeacher.designation.split(',')[0]}</p>
                      <p>Department of English</p>
                      <p>Jahangirnagar University</p>
                      <p>Savar, Dhaka</p>
                    </div>

                    <div>
                      <p>Submitted by</p>
                      <p style={{ fontWeight: 'bold', textTransform: 'uppercase' }}>{studentName || "_____________________"}</p>
                      <p>Roll No: <span style={{ fontWeight: 'bold' }}>{selectedRoll || "_____"}</span></p>
                      <p>Registration: {studentReg || "_____________"}</p>
                      <p>Session: 2021-22</p>
                      <p>Department of English</p>
                      <p>Faculty of Arts & Humanities</p>
                      <p>Jahangirnagar University</p>
                      <p>Savar, Dhaka.</p>
                    </div>
                  </div>
                ) : (
                  <div class="academic-font" style={{ display: 'flex', justifyContent: 'space-between', fontSize: '12pt', lineHeight: '1.5' }}>
                    <div style={{ width: '48%' }}>
                      <p>Submitted to</p>
                      <p style={{ fontWeight: 'bold' }}>{currentTeacher.name}</p>
                      <p>{currentTeacher.designation.split(',')[0]}</p>
                      <p>Department of English</p>
                      <p>Jahangirnagar University</p>
                      <p>Savar, Dhaka</p>
                    </div>

                    <div style={{ width: '48%', paddingLeft: '5%' }}>
                      <p>Submitted by</p>
                      <p style={{ fontWeight: 'bold', textTransform: 'uppercase' }}>{studentName || "_____________________"}</p>
                      <p>Roll No: <span style={{ fontWeight: 'bold' }}>{selectedRoll || "_____"}</span></p>
                      <p>Registration: {studentReg || "_____________"}</p>
                      <p>Session: 2021-22</p>
                      <p>Department of English</p>
                      <p>Faculty of Arts & Humanities</p>
                      <p>Jahangirnagar University</p>
                      <p>Savar, Dhaka.</p>
                    </div>
                  </div>
                )}
              </div>

              {/* Bottom: Submission Date */}
              <div class="academic-font" style={{ textAlign: 'center', fontSize: '12pt', fontWeight: 'bold', marginTop: 'auto', marginBottom: '20px' }}>
                <p>Submission Date: - {formattedDate}</p>
              </div>

            </div>
          </div>

        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
