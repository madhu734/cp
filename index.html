                      { name: 'Classic Black', hex: '#000000' },
                      { name: 'Royal Crimson', hex: '#881337' },
                      { name: 'Emerald Scholar', hex: '#064e3b' }
                    ].map(color => (
                      <button
                        key={color.hex}
                        onClick={() => { setBorderColor(color.hex); setLogoColor(color.hex); }}
                        style={{ backgroundColor: color.hex }}
                        title={color.name}
                        class={`w-6 h-6 rounded-full border-2 transition-all ${borderColor === color.hex ? 'border-amber-400 scale-110 shadow-md' : 'border-white hover:scale-105'}`}
                      />
                    ))}
                  </div>
                </div>

              </div>

            </div>

            {/* Print/Download Actions */}
            <div class="mt-auto pt-6 flex flex-col gap-3">
              <button
                onClick={triggerPrint}
                class="w-full py-3 bg-gradient-to-r from-blue-700 to-indigo-800 hover:from-blue-800 hover:to-indigo-900 text-white font-bold rounded-2xl shadow-lg shadow-indigo-600/15 flex items-center justify-center gap-2 transition-all hover:scale-[1.02] active:scale-[0.98]"
              >
                <i data-lucide="printer" class="w-5 h-5"></i>
                Print / Save as PDF
              </button>
              
              <button
                onClick={downloadWord}
                class="w-full py-3 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold rounded-2xl flex items-center justify-center gap-2 border border-slate-300/60 transition-all hover:scale-[1.02] active:scale-[0.98]"
              >
                <i data-lucide="file-text" class="w-5 h-5 text-blue-600"></i>
                Export to Editable MS Word
              </button>
              
              <div class="text-[10px] text-center text-slate-400 font-medium">
                Tip: If printing to PDF, enable "Background graphics" and set layout to "A4 Portrait" with "None/Default" margins.
              </div>
            </div>
          </div>

          {/* Live Document Preview Panel (Right Panel) */}
          <div class="flex-1 flex justify-center items-center bg-slate-300/40 p-4 rounded-3xl overflow-x-auto min-h-[90vh]">
            
            {/* The A4 Page simulation */}
            <div 
              id="cover-page-document"
              class="print-area w-full max-w-[800px] a4-preview bg-white shadow-2xl p-12 lg:p-16 flex flex-col items-center justify-between relative transition-all"
              style={{
                border: borderStyle === "double" ? `10px double ${borderColor}` : borderStyle === "solid" ? `3px solid ${borderColor}` : "none",
                margin: '0 auto',
                boxSizing: 'border-box'
              }}
            >
              
              {/* JU Logo (Elegant Hand-drawn High Quality SVG representation of Jahangirnagar University emblem) */}
              <div class="flex flex-col items-center gap-2 transition-all mt-4">
                <svg width="120" height="120" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg" class="transition-all">
                  {/* Outer Shield Border */}
                  <path d="M100 10 L140 30 C160 80 145 135 100 160 C55 135 40 80 60 30 Z" stroke={logoColor} strokeWidth="3" fill="none" />
                  {/* Decorative Frame Elements (representing traditional curves) */}
                  <circle cx="100" cy="95" r="45" stroke={logoColor} strokeWidth="2" strokeDasharray="4 2" />
                  <circle cx="100" cy="95" r="35" stroke={logoColor} strokeWidth="1.5" />
                  
                  {/* Lotus petals (শাপলা) in the center */}
                  <path d="M100 70 C95 82 82 92 82 105 C82 115 90 120 100 120 C110 120 118 115 118 105 C118 92 105 82 100 70 Z" stroke={logoColor} strokeWidth="2.5" fill="none" />
                  <path d="M100 80 C88 88 72 95 72 106 C72 114 80 118 88 118 C95 118 98 112 100 108" stroke={logoColor} strokeWidth="2" fill="none" />
                  <path d="M100 80 C112 88 128 95 128 106 C128 114 120 118 112 118 C105 118 102 112 100 108" stroke={logoColor} strokeWidth="2" fill="none" />
                  
                  {/* Decorative bottom curves for university style */}
                  <path d="M50 145 C70 165 130 165 150 145" stroke={logoColor} strokeWidth="2" strokeLinecap="round" />
                  
                  {/* Bengali text representing 'জাহাঙ্গীরনগর বিশ্ববিদ্যালয়' below the shield */}
                  <text x="100" y="180" textAnchor="middle" fill={logoColor} style={{ fontFamily: 'sans-serif', fontSize: '11px', fontWeight: 'bold', letterSpacing: '0.5px' }}>জাহাঙ্গীরনগর বিশ্ববিদ্যালয়</text>
                </svg>
              </div>

              {/* Assignment Topic Section */}
              <div class="w-full text-center flex flex-col gap-5 my-6">
                <span class="academic-font uppercase tracking-widest text-slate-500 font-bold text-xs lg:text-sm">Assignment on</span>
                <div class="h-0.5 w-16 bg-slate-300 mx-auto"></div>
                <h2 class="academic-font font-bold text-base lg:text-xl text-slate-900 leading-relaxed max-w-[90%] mx-auto whitespace-pre-line px-4">
                  {assignmentTopic || "Please enter your Assignment Topic"}
                </h2>
              </div>

              {/* Course details */}
              <div class="w-full text-center flex flex-col gap-1">
                <p class="academic-font font-bold text-sm lg:text-base text-slate-800">
                  Course Code: <span class="uppercase font-semibold">{selectedCourseCode}</span>
                </p>
                <p class="academic-font font-bold text-base lg:text-lg text-slate-800">
                  Course Title: {customCourseTitle || "Selected Course Title"}
                </p>
              </div>

              {/* Information Grid for Submitted To and Submitted By (Department Format Style) */}
              <div class="w-full grid grid-cols-2 gap-8 text-left mt-4 border-t border-slate-200/60 pt-8 px-6">
                
                {/* Submitted To Details */}
                <div class="flex flex-col gap-2">
                  <span class="academic-font uppercase tracking-wider text-slate-400 font-bold text-[10px]">Submitted to</span>
                  <div class="flex flex-col gap-0.5">
                    <p class="academic-font font-bold text-sm lg:text-[15px] text-slate-900">{currentTeacher.name}</p>
                    <p class="academic-font text-xs lg:text-sm text-slate-600 font-medium">{currentTeacher.designation}</p>
                    <p class="academic-font text-xs text-slate-500 mt-1">Department of English</p>
                    <p class="academic-font text-xs text-slate-500 font-medium">Jahangirnagar University</p>
                    <p class="academic-font text-[11px] text-slate-400">Savar, Dhaka</p>
                  </div>
                </div>

                {/* Submitted By Details */}
                <div class="flex flex-col gap-2">
                  <span class="academic-font uppercase tracking-wider text-slate-400 font-bold text-[10px]">Submitted by</span>
                  <div class="flex flex-col gap-0.5">
                    <p class="academic-font font-bold text-sm lg:text-[15px] text-slate-900">{studentName}</p>
                    <p class="academic-font text-xs lg:text-sm text-slate-700 font-medium">Roll No: <span class="font-bold">{selectedRoll}</span></p>
                    <p class="academic-font text-xs lg:text-sm text-slate-700 font-medium">Registration: {studentReg}</p>
                    <p class="academic-font text-xs text-slate-500 mt-1">Session: {session}</p>
                    <p class="academic-font text-xs text-slate-500">Department of English</p>
                    <p class="academic-font text-[11px] text-slate-400">Faculty of Arts & Humanities</p>
                  </div>
                </div>

              </div>

              {/* Submission Date */}
              <div class="w-full text-center border-t border-slate-100 pt-6 pb-2">
                <p class="academic-font font-bold text-xs lg:text-sm text-slate-700">
                  Submission Date: <span class="font-semibold text-slate-900">{formattedDate || "DD/MM/YYYY"}</span>
                </p>
              </div>

            </div>
          </div>

        </div>
      );
    }

    // Initialize Lucide icons on render
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
    
    // Trigger icons render after DOM paints
    setTimeout(() => {
      lucide.createIcons();
    }, 1000);
  </script>
</body>
</html>
