          .then(blob => {

            reader.onloadend = () => {

            };
            reader.readAsDataURL(blob);
          })
          .catch(err => {

            setBase64Logo('https://i.postimg.cc/3xrkfThk/ju-logo.png'); // fallback
          });
      }, []);

        if (!selectedCourseCode) return "__________________________";
        const found = coursesData.find(c => c.code === selectedCourseCode);
        return found ? found.title : "";
      }, [selectedCourseCode]);

        if (selectedRoll) {

          if (found) {
            setStudentName(found.name);
            setStudentReg(found.reg);
          }
        } else {
          setStudentName("");
          setStudentReg("");
        }
      }, [selectedRoll]);

        if (selectedTeacherIndex === "") return { name: "__________________________", designation: "Professor, Department of English" };

        return found ? found : { name: "", designation: "" };
      }, [selectedTeacherIndex]);

      const formattedDate = useMemo(() => {
        if (!submissionDate) return "________________";
        const parts = submissionDate.split("-");
        if (parts.length === 3) return `${parts[2]}/${parts[1]}/${parts[0]}`;
        return submissionDate;
      }, [submissionDate]);

      const uppercaseTopic = useMemo(() => {
        if (!assignmentTopic) return "___________________________________________________\n___________________________________________________";
        return assignmentTopic.trim().toUpperCase();
      }, [assignmentTopic]);

      // --- Actions ---
      const validateFields = () => {
        if (!assignmentTopic.trim()) { setModalMsg("অনুগ্রহ করে Assignment Topic লিখুন!"); setShowModal(true); return false; }

          margin: 0,
          filename: `Cover_Page_${selectedRoll}.pdf`,
          image: { type: 'jpeg', quality: 1 },
          html2canvas: { scale: 2, useCORS: true },
          jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save();
      };

        if (!validateFields()) return;

          <p align="center" style="font-weight: bold;">${currentTeacher.name}</p>
          <p align="center">${currentTeacher.designation.split(',')[0]}</p>

          <p align="center">Jahangirnagar University</p>

          <p align="center">Roll No: ${selectedRoll}</p>

          <p align="center">Faculty of Arts & Humanities</p>
          <p align="center">Jahangirnagar University</p>
          <p align="center">Savar, Dhaka.</p>
        `;

          <table width="100%" border="0" cellspacing="0" cellpadding="0" style="margin-top: 50px;">
            <tr>
              <td width="50%" valign="top" style="padding-right: 10px;">
                <p>Submitted to</p>
                <p style="font-weight: bold;">${currentTeacher.name}</p>
                <p>${currentTeacher.designation.split(',')[0]}</p>
                <p>Department of English</p>
                <p>Jahangirnagar University</p>
                <p>Savar, Dhaka</p>
              </td>

                <p style="font-weight: bold;">${studentName}</p>
                <p>Roll No: ${selectedRoll}</p>
                <p>Registration: ${studentReg}</p>
                <p>Session: 2021-22</p>
                <p>Department of English</p>
                <p>Faculty of Arts & Humanities</p>
                <p>Jahangirnagar University</p>
                <p>Savar, Dhaka.</p>
              </td>
            </tr>
          </table>
        `;

        const wordHtmlContent = `
          <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
          <head>
            <meta charset="utf-8">
            <title>Cover Page</title>
            <style>
              @page {
                size: 8.27in 11.69in; /* A4 Size */
                margin: 1in; /* Professional Word Margin */
              }
              body {
                font-family: 'Times New Roman', serif;
                margin: 0;
                padding: 0;
              }
              p {
                margin: 0;
                padding: 0;
                margin-bottom: 5px;
                font-family: 'Times New Roman', serif;
                font-size: 13pt; /* Good readable size for A4 */
              }
              .topic {
                font-size: 14pt;
                font-weight: bold;
                text-transform: uppercase;
                margin-top: 10px;
                margin-bottom: 25px;
                line-height: 1.3;
              }
            </style>
          </head>
          <body>
            <div>
              <p align="center" style="margin-top: 15px; margin-bottom: 15px;">
                <img src="${base64Logo}" width="100" height="100" />
              </p>
              
              <p align="center" style="margin-bottom: 5px;">Assignment on</p>
              <p align="center" class="topic">${uppercaseTopic.replace(/\n/g, '<br/>')}</p>
              
              <p align="center"><b>Course Code: ${selectedCourseCode}</b></p>
              <p align="center"><b>Course Title: ${currentCourseTitle}</b></p>
              
              ${layoutStyle === 'centered' ? centeredDetailsHtml : sideBySideDetailsHtml}
              
              <p align="center" style="margin-top: 50px;"><b>Submission Date: - ${formattedDate}</b></p>
            </div>
          </body>
          </html>
        `;

        const blob = new Blob(['\ufeff' + wordHtmlContent], { type: 'application/msword' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `Cover_Page_${selectedRoll}.doc`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      };

      return (
        <div class="min-h-screen flex flex-col lg:flex-row gap-6 p-4 lg:p-6 justify-center">

          {showModal && (

                  <ellipse cx="65" cy="35" rx="14" ry="24" fill="#38BDF8" fillOpacity="0.3" stroke="#0284C7" strokeWidth="3" transform="rotate(30 65 35)" />

                  <path d="M39 56H61" stroke="#1E293B" strokeWidth="4" strokeLinecap="round" />
                  <circle cx="50" cy="27" r="9" fill="#FBBF24" stroke="#1E293B" strokeWidth="4" />

            <div class="flex flex-col gap-4">
              <div class="flex flex-col gap-1">
                <label class="text-xs font-bold text-slate-600 uppercase tracking-wide flex items-center">
                  Topic <span class="text-red-500 ml-1">*</span>
                </label>
                <textarea
                  value={assignmentTopic}
                  onChange={(e) => setAssignmentTopic(e.target.value)}
                  placeholder="Enter assignment topic..."
                  class="w-full p-2.5 text-xs rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 min-h-[70px] resize-y"
                />
              </div>

              <div class="grid grid-cols-2 gap-3">
                <div class="flex flex-col gap-1">
                  <label class="text-xs font-bold text-slate-600 uppercase tracking-wide">Course <span class="text-red-500">*</span></label>
                  <select
                    value={selectedCourseCode}
                    onChange={(e) => setSelectedCourseCode(e.target.value)}
                    class="w-full p-2 text-xs rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white font-semibold text-slate-700"
                  >
                    <option value="">Code</option>
                    {coursesData.map(c => <option key={c.code} value={c.code}>{c.code}</option>)}
                  </select>
                </div>

                <div class="flex flex-col gap-1">
                  <label class="text-xs font-bold text-slate-600 uppercase tracking-wide">Roll <span class="text-red-500">*</span></label>
                  <select
                    value={selectedRoll}
                    onChange={(e) => setSelectedRoll(e.target.value)}
                    class="w-full p-2 text-xs rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white font-semibold text-slate-700"
                  >
                    <option value="">Roll</option>
                    {studentsData.map(s => <option key={s.roll} value={s.roll}>{s.roll}</option>)}
                  </select>
                </div>
              </div>

              <div class="flex flex-col gap-1">
                <label class="text-xs font-bold text-slate-600 uppercase tracking-wide">Teacher <span class="text-red-500">*</span></label>
                <select
                  value={selectedTeacherIndex}
                  onChange={(e) => setSelectedTeacherIndex(e.target.value === "" ? "" : parseInt(e.target.value))}
                  class="w-full p-2 text-xs rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white text-slate-700"
                >
                  <option value="">Select Teacher</option>
                  {teachersData.map((t, idx) => <option key={idx} value={idx}>{t.name}</option>)}
                </select>
              </div>

              <div class="flex flex-col gap-1">
                <label class="text-xs font-bold text-slate-600 uppercase tracking-wide">Submit Date <span class="text-red-500">*</span></label>
                <input
                  type="date"
                  value={submissionDate}
                  onKeyDown={(e) => e.preventDefault()}
                  onChange={(e) => setSubmissionDate(e.target.value)}
                  class="w-full p-2 text-xs rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 text-slate-600 font-semibold cursor-pointer"
                />
              </div>

              {/* Layout Option replacing Border Option */}
              <div class="h-px bg-slate-100 my-1"></div>
              <div class="flex items-center justify-between gap-2">
                <span class="text-[11px] font-bold text-slate-500 uppercase tracking-wider">Layout Style</span>
                <div class="flex bg-slate-100 rounded-lg p-0.5 border border-slate-200/60">
                  <button onClick={() => setLayoutStyle("centered")} class={`px-2 py-1 text-[10px] rounded-md font-bold transition-all ${layoutStyle === "centered" ? "bg-white shadow-sm text-blue-700" : "text-slate-500"}`}>Centered</button>
                  <button onClick={() => setLayoutStyle("side-by-side")} class={`px-2 py-1 text-[10px] rounded-md font-bold transition-all ${layoutStyle === "side-by-side" ? "bg-white shadow-sm text-blue-700" : "text-slate-500"}`}>Side-by-Side</button>
                </div>
              </div>
            </div>

            {/* Action Buttons */}
            <div class="mt-auto pt-4 flex flex-col gap-2">
              <button onClick={handlePdfDownload} class="w-full py-2.5 bg-slate-900 hover:bg-slate-800 text-white font-bold text-xs rounded-xl shadow-md flex items-center justify-center gap-2 transition-all active:scale-95">
                <i data-lucide="download" class="w-4 h-4"></i> Download PDF
              </button>
              <button onClick={handleWordDownload} class="w-full py-2 bg-blue-50 hover:bg-blue-100 text-blue-700 font-bold text-xs rounded-xl flex items-center justify-center gap-2 border border-blue-200 transition-all active:scale-95">
                <i data-lucide="file-text" class="w-4 h-4"></i> Download Word (.doc)
              </button>
            </div>
          </div>

          {/* Document Preview (Right) - Perfect A4 Simulation */}
          <div class="flex-1 flex justify-center w-full max-w-[850px] overflow-auto py-2">
            
            <div 
              id="cover-page-document"
              class="w-full max-w-[750px] a4-preview bg-white flex flex-col items-center justify-between py-[8%] px-[10%] relative"
            >
              
              {/* Header: Logo and Topic */}
              <div class="flex flex-col items-center w-full">
                <img 
                  src={base64Logo || "https://i.postimg.cc/3xrkfThk/ju-logo.png"} 
                  alt="JU Logo" 
                  class="w-[110px] h-[110px] object-contain mb-4 mt-2" 
                  crossOrigin="anonymous"
                />

                <div class="academic-font text-center w-full">
                  <p class="text-[13px] lg:text-[14px] mb-2">Assignment on</p>
                  <h2 class="font-bold text-[14px] lg:text-[16px] uppercase max-w-[95%] mx-auto whitespace-pre-wrap leading-relaxed px-4">
                    {uppercaseTopic}
                  </h2>
                </div>
              </div>

              {/* Middle: Course Info - Completely Bold */}
              <div class="academic-font text-center flex flex-col gap-1 text-[13px] lg:text-[15px] w-full font-bold">
                <p>Course Code: {selectedCourseCode || "_____"}</p>
                <p>Course Title: {currentCourseTitle}</p>
              </div>

              {/* Lower Middle: Submitted To & By based on Layout Style */}
              {layoutStyle === 'centered' ? (
                <div class="w-full flex flex-col gap-8 academic-font text-center text-[13px] lg:text-[15px]">
                  <div class="flex flex-col gap-1">
                    <p>Submitted to</p>
                    <p class="font-bold">{currentTeacher.name}</p>
                    <p>{currentTeacher.designation.split(',')[0]}</p>
                    <p>Department of English</p>
                    <p>Jahangirnagar University</p>
                    <p>Savar, Dhaka</p>
                  </div>

                  <div class="flex flex-col gap-1">
                    <p>Submitted by</p>
                    <p class="font-bold uppercase">{studentName || "_____________________"}</p>
                    <p>Roll No: {selectedRoll || "_____"}</p>
                    <p>Registration: {studentReg || "_____________"}</p>
                    <p>Session: 2021-22</p>
                    <p>Department of English</p>
                    <p>Faculty of Arts & Humanities</p>
                    <p>Jahangirnagar University</p>
                    <p>Savar, Dhaka.</p>
                  </div>
                </div>
              ) : (
                <div class="w-full grid grid-cols-2 gap-4 academic-font text-left text-[13px] lg:text-[15px]">
                  <div class="flex flex-col gap-1">
                    <p>Submitted to</p>
                    <p class="font-bold">{currentTeacher.name}</p>
                    <p>{currentTeacher.designation.split(',')[0]}</p>
                    <p>Department of English</p>
                    <p>Jahangirnagar University</p>
                    <p>Savar, Dhaka</p>
                  </div>

                  <div class="flex flex-col gap-1 pl-4">
                    <p>Submitted by</p>
                    <p class="font-bold uppercase">{studentName || "_____________________"}</p>
                    <p>Roll No: {selectedRoll || "_____"}</p>
                    <p>Registration: {studentReg || "_____________"}</p>
                    <p>Session: 2021-22</p>
                    <p>Department of English</p>
                    <p>Faculty of Arts & Humanities</p>
                    <p>Jahangirnagar University</p>
                    <p>Savar, Dhaka.</p>
                  </div>
                </div>
              )}

              {/* Bottom: Submission Date - Completely Bold */}
              <div class="w-full academic-font text-center text-[13px] lg:text-[15px] font-bold mt-2">
                <p>Submission Date: - {formattedDate}</p>
              </div>

            </div>
          </div>

        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
