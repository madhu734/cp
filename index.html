            <div class="flex flex-col gap-4">
              
              {/* Assignment Topic */}
              <div class="flex flex-col gap-1">
                <label class="text-xs font-bold text-slate-600 uppercase tracking-wide flex items-center">
                  Topic <span class="text-red-500 ml-1">*</span>
                </label>
                <textarea
                  value={assignmentTopic}
                  onChange={(e) => setAssignmentTopic(e.target.value)}
                  placeholder="Enter assignment topic..."
                  class="w-full p-2.5 text-xs rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50/50 min-h-[70px] resize-y"
                />
              </div>

              {/* Compact Grid 1: Course & Roll */}
              <div class="grid grid-cols-2 gap-3">
                <div class="flex flex-col gap-1">
                  <label class="text-xs font-bold text-slate-600 uppercase tracking-wide">
                    Course <span class="text-red-500 ml-1">*</span>
                  </label>
                  <select
                    value={selectedCourseCode}
                    onChange={(e) => setSelectedCourseCode(e.target.value)}
                    class="w-full p-2 text-xs rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white font-semibold text-slate-700"
                  >
                    <option value="">Select Code</option>
                    {coursesData.map(c => (
                      <option key={c.code} value={c.code}>{c.code}</option>
                    ))}
                  </select>
                </div>

                <div class="flex flex-col gap-1">
                  <label class="text-xs font-bold text-slate-600 uppercase tracking-wide">
                    Roll <span class="text-red-500 ml-1">*</span>
                  </label>
                  <select
                    value={selectedRoll}
                    onChange={(e) => setSelectedRoll(e.target.value)}
                    class="w-full p-2 text-xs rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white font-semibold text-slate-700"
                  >
                    <option value="">Select Roll</option>
                    {studentsData.map(s => (
                      <option key={s.roll} value={s.roll}>{s.roll}</option>
                    ))}
                  </select>
                </div>
              </div>

              {/* Compact Grid 2: Teacher Selection & Date Selection */}
              <div class="grid grid-cols-1 gap-3">
                
                <div class="flex flex-col gap-1">
                  <label class="text-xs font-bold text-slate-600 uppercase tracking-wide">
                    Teacher <span class="text-red-500 ml-1">*</span>
                  </label>
                  <select
                    value={selectedTeacherIndex}
                    onChange={(e) => setSelectedTeacherIndex(e.target.value === "" ? "" : parseInt(e.target.value))}
                    class="w-full p-2 text-xs rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white text-slate-700"
                  >
                    <option value="">Select Teacher</option>
                    {teachersData.map((t, idx) => (
                      <option key={idx} value={idx}>{t.name}</option>
                    ))}
                  </select>
                </div>

                <div class="flex flex-col gap-1">
                  <label class="text-xs font-bold text-slate-600 uppercase tracking-wide">
                    Submit Date <span class="text-red-500 ml-1">*</span>
                  </label>
                  <input
                    type="date"
                    value={submissionDate}
                    onKeyDown={(e) => e.preventDefault()} // Disables keyboard input entirely for smooth modern calendar selection
                    onChange={(e) => setSubmissionDate(e.target.value)}
                    class="w-full p-2 text-xs rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50/50 text-slate-600 font-semibold"
                  />
                </div>

              </div>

              {/* Theme Customizations */}
              <div class="h-px bg-slate-100"></div>
              <div class="flex flex-col gap-2.5">
                <h3 class="text-xs font-bold text-slate-600 uppercase tracking-wide flex items-center gap-1">
                  <i data-lucide="palette" class="w-3 h-3 text-blue-500"></i> Theme Options
                </h3>
                
                {/* Border Picker */}
                <div class="flex items-center justify-between gap-2">
                  <span class="text-xs font-medium text-slate-500">Border</span>
                  <div class="flex bg-slate-100 rounded-lg p-0.5 border border-slate-200/60">
                    <button
                      onClick={() => setBorderStyle("double")}
                      class={`px-2 py-0.5 text-[10px] rounded-md font-bold transition-all ${borderStyle === "double" ? "bg-white text-blue-700 shadow-sm" : "text-slate-500"}`}
                    >
                      Double
                    </button>
                    <button
                      onClick={() => setBorderStyle("solid")}
                      class={`px-2 py-0.5 text-[10px] rounded-md font-bold transition-all ${borderStyle === "solid" ? "bg-white text-blue-700 shadow-sm" : "text-slate-500"}`}
                    >
                      Solid
                    </button>
                    <button
                      onClick={() => setBorderStyle("none")}
                      class={`px-2 py-0.5 text-[10px] rounded-md font-bold transition-all ${borderStyle === "none" ? "bg-white text-blue-700 shadow-sm" : "text-slate-500"}`}
                    >
                      None
                    </button>
                  </div>
                </div>

                {/* Ink Theme Color */}
                <div class="flex items-center justify-between gap-2">
                  <span class="text-xs font-medium text-slate-500">Ink Color</span>
                  <div class="flex gap-1.5">
                    {[
                      { name: 'JU Navy', hex: '#006599' },
                      { name: 'Black', hex: '#000000' },
                      { name: 'Crimson', hex: '#881337' },
                      { name: 'Emerald', hex: '#064e3b' }
                    ].map(color => (
                      <button
                        key={color.hex}
                        onClick={() => setBorderColor(color.hex)}
                        style={{ backgroundColor: color.hex }}
                        title={color.name}
                        class={`w-4 h-4 rounded-full border-2 transition-all ${borderColor === color.hex ? 'border-amber-400 scale-110' : 'border-white hover:scale-105'}`}
                      />
                    ))}
                  </div>
                </div>

              </div>

            </div>

            {/* Print/Download Button Panel */}
            <div class="mt-auto pt-3 flex flex-col gap-2">
              <button
                onClick={handlePdfDownload}
                class="w-full py-2.5 bg-gradient-to-r from-blue-700 to-indigo-800 hover:from-blue-800 hover:to-indigo-900 text-white font-bold text-xs rounded-xl shadow-md flex items-center justify-center gap-2 transition-all active:scale-95"
              >
                <i data-lucide="download" class="w-4 h-4"></i>
                Download PDF
              </button>
              
              <button
                onClick={handleWordDownload}
                class="w-full py-2 bg-slate-50 hover:bg-slate-100 text-slate-700 font-bold text-xs rounded-xl flex items-center justify-center gap-2 border border-slate-200 transition-all active:scale-95"
              >
                <i data-lucide="file-text" class="w-4 h-4 text-blue-600"></i>
                Download Word (.doc)
              </button>
            </div>
          </div>

          {/* Live Document Preview Panel */}
          <div class="flex-1 flex justify-center items-center bg-slate-300/35 p-4 rounded-3xl overflow-x-auto min-h-[90vh]">
            
            {/* The A4 Page simulation */}
            <div 
              id="cover-page-document"
              class="print-area w-full max-w-[800px] a4-preview bg-white shadow-2xl p-10 lg:p-14 flex flex-col items-center justify-between relative transition-all"
              style={{
                border: borderStyle === "double" ? `10px double ${borderColor}` : borderStyle === "solid" ? `3px solid ${borderColor}` : "none",
                margin: '0 auto',
                boxSizing: 'border-box'
              }}
            >
              
              {/* JU Genuine Logo */}
              <div class="flex flex-col items-center gap-2 mt-4">
                <img 
                  src="https://i.postimg.cc/3xrkfThk/ju-logo.png" 
                  alt="Jahangirnagar University Logo" 
                  class="w-[105px] h-[105px] object-contain" 
                />
              </div>

              {/* Assignment Topic Section */}
              <div class="w-full text-center flex flex-col gap-3 my-3">
                <span class="academic-font uppercase tracking-widest text-slate-500 font-bold text-xs lg:text-sm">Assignment on</span>
                <div class="h-px w-14 bg-slate-300 mx-auto"></div>
                <h2 class="academic-font font-bold text-sm lg:text-base text-slate-900 leading-relaxed max-w-[94%] mx-auto whitespace-pre-line px-4 tracking-wide">
                  {uppercaseTopic}
                </h2>
              </div>

              {/* Course details */}
              <div class="w-full text-center flex flex-col gap-0.5">
                <p class="academic-font font-bold text-xs lg:text-sm text-slate-800">
                  Course Code: <span class="uppercase font-semibold">{selectedCourseCode || "___________"}</span>
                </p>
                <p class="academic-font font-bold text-sm lg:text-base text-slate-800">
                  Course Title: {currentCourseTitle}
                </p>
              </div>

              {/* Information Grid */}
              <div class="w-full grid grid-cols-2 gap-6 text-left mt-2 border-t border-slate-200/60 pt-6 px-6">
                
                {/* Submitted To Details */}
                <div class="flex flex-col gap-1">
                  <span class="academic-font uppercase tracking-wider text-slate-400 font-bold text-[9px]">Submitted to</span>
                  <div class="flex flex-col gap-0.5">
                    <p class="academic-font font-bold text-xs lg:text-[14px] text-slate-900 leading-snug">{currentTeacher.name}</p>
                    <p class="academic-font text-[11px] lg:text-xs text-slate-600 font-medium">{currentTeacher.designation}</p>
                    <p class="academic-font text-[11px] text-slate-500 mt-0.5">Department of English</p>
                    <p class="academic-font text-[11px] text-slate-500 font-medium">Jahangirnagar University</p>
                    <p class="academic-font text-[10px] text-slate-400">Savar, Dhaka</p>
                  </div>
                </div>

                {/* Submitted By Details */}
                <div class="flex flex-col gap-1">
                  <span class="academic-font uppercase tracking-wider text-slate-400 font-bold text-[9px]">Submitted by</span>
                  <div class="flex flex-col gap-0.5">
                    <p class="academic-font font-bold text-xs lg:text-[14px] text-slate-900 leading-snug">{studentName || "__________________________"}</p>
                    <p class="academic-font text-[11px] lg:text-xs text-slate-700 font-bold">Roll No: <span>{selectedRoll || "____"}</span></p>
                    <p class="academic-font text-[11px] lg:text-xs text-slate-700 font-semibold">Registration: {studentReg || "________________"}</p>
                    <p class="academic-font text-[11px] text-slate-500 mt-0.5">Session: 2021-22</p>
                    <p class="academic-font text-[11px] text-slate-500">Department of English</p>
                    <p class="academic-font text-[10px] text-slate-400">Faculty of Arts & Humanities</p>
                  </div>
                </div>

              </div>

              {/* Submission Date */}
              <div class="w-full text-center border-t border-slate-100 pt-5 pb-2">
                <p class="academic-font font-bold text-xs lg:text-sm text-slate-700">
                  Submission Date: <span class="font-semibold text-slate-900">{formattedDate}</span>
                </p>
              </div>

            </div>
          </div>

        </div>
      );
    }

    // Initialize Lucide icons on render
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
    
    // Trigger icons render after DOM paints
    setTimeout(() => {
      lucide.createIcons();
    }, 1000);
  </script>
</body>
</html>
